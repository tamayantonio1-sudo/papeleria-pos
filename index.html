<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema POS - Mi Papelería</title>
    
    <!-- Librerías de React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Iconos Phosphor (Reemplazo ligero para Lucide en CDN) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { background-color: #f1f5f9; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // =================================================================
        // ATENCIÓN: PEGA TU URL DE GOOGLE APPS SCRIPT AQUÍ ABAJO
        // =================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7eXbprdeQzkZZbaJJBnnEDLJ-g8BULGtQZHnZNM-XBdNLa20Plh-EflUT-aVNtL2wKA/exec"; 
        // =================================================================

        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('pos');
            const [inventory, setInventory] = useState([]);
            const [missingItems, setMissingItems] = useState([]);
            const [cart, setCart] = useState([]);
            const [notification, setNotification] = useState('');
            const [isLoading, setIsLoading] = useState(true);

            // Inventario por defecto (para cuando no hay Google Sheets conectado)
            const defaultInventory = [
                { id: 1, name: 'Cartulina Blanca', unitCost: 1.76, margin: 30, price: 2.51, stock: 25, minStock: 6 },
                { id: 2, name: 'Cartulina Amarilla', unitCost: 2.12, margin: 30, price: 3.03, stock: 25, minStock: 6 },
                { id: 3, name: 'Cartulina Azul', unitCost: 2.12, margin: 30, price: 3.03, stock: 25, minStock: 6 },
                { id: 4, name: 'Cartulina Rosa', unitCost: 2.12, margin: 30, price: 3.03, stock: 25, minStock: 6 },
                { id: 5, name: 'Cartulina Verde', unitCost: 2.12, margin: 30, price: 3.03, stock: 25, minStock: 6 },
                { id: 6, name: 'Papel Bon', unitCost: 3.00, margin: 30, price: 4.29, stock: 25, minStock: 6 },
                { id: 7, name: 'Pliego Papel Cascaron Entero', unitCost: 1.92, margin: 30, price: 2.74, stock: 25, minStock: 6 },
                { id: 8, name: 'Papel Cascaron 1/8', unitCost: 4.33, margin: 30, price: 6.19, stock: 12, minStock: 3 },
                { id: 9, name: 'Papel Cascaron 1/4', unitCost: 8.75, margin: 30, price: 12.50, stock: 12, minStock: 3 },
                { id: 10, name: 'Libreta Prof Rayas', unitCost: 10.00, margin: 30, price: 14.29, stock: 2, minStock: 2 },
                { id: 11, name: 'Libreta Prof Cuadros GR', unitCost: 12.00, margin: 30, price: 17.14, stock: 2, minStock: 2 },
                { id: 12, name: 'Bolígrafo Punta Fina', unitCost: 1.71, margin: 30, price: 2.44, stock: 24, minStock: 6 },
                { id: 13, name: 'Bolígrafo Punta Media', unitCost: 1.71, margin: 30, price: 2.44, stock: 24, minStock: 6 },
                { id: 14, name: 'Marca Textos Pastel', unitCost: 8.33, margin: 30, price: 11.90, stock: 12, minStock: 3 },
                { id: 15, name: 'Marca Textos Brillante', unitCost: 13.00, margin: 30, price: 18.57, stock: 10, minStock: 2 },
                { id: 16, name: 'Cinta Adhesiva Chica', unitCost: 5.00, margin: 30, price: 7.14, stock: 9, minStock: 2 },
                { id: 17, name: 'Cinta Adhesiva Grande', unitCost: 18.50, margin: 30, price: 26.43, stock: 2, minStock: 2 },
                { id: 18, name: 'Borrador Mediano', unitCost: 3.67, margin: 30, price: 5.24, stock: 30, minStock: 7 },
                { id: 19, name: 'Corrector Botellita', unitCost: 8.40, margin: 30, price: 12.00, stock: 10, minStock: 2 },
                { id: 20, name: 'Lápiz N2 Smarty', unitCost: 2.18, margin: 30, price: 3.11, stock: 50, minStock: 12 },
                { id: 21, name: 'Bicolor Hexagonal', unitCost: 3.18, margin: 30, price: 4.54, stock: 50, minStock: 12 },
                { id: 22, name: 'Paquete Colores 6pz', unitCost: 25.00, margin: 30, price: 35.71, stock: 6, minStock: 2 },
                { id: 23, name: 'Sacapuntas Plástico', unitCost: 0.65, margin: 30, price: 0.92, stock: 150, minStock: 37 },
                { id: 24, name: 'Tijera 5" Sencilla', unitCost: 12.33, margin: 30, price: 17.62, stock: 6, minStock: 2 },
                { id: 25, name: 'Regla Aluminio', unitCost: 15.33, margin: 30, price: 21.90, stock: 6, minStock: 2 },
                { id: 26, name: 'Cutter Chico', unitCost: 5.00, margin: 30, price: 7.14, stock: 4, minStock: 2 },
                { id: 27, name: 'Cutter Med Transparente', unitCost: 8.00, margin: 30, price: 11.43, stock: 2, minStock: 2 },
                { id: 28, name: 'Cutter Med Color Sólido', unitCost: 9.00, margin: 30, price: 12.86, stock: 1, minStock: 2 },
                { id: 29, name: 'Pegamento Blanco Botellita', unitCost: 2.00, margin: 30, price: 2.86, stock: 25, minStock: 6 },
                { id: 30, name: 'Cinta Maskin Med', unitCost: 12.50, margin: 30, price: 17.86, stock: 2, minStock: 2 },
                { id: 31, name: 'Acuarelas Chicas', unitCost: 8.17, margin: 30, price: 11.67, stock: 6, minStock: 2 },
                { id: 32, name: 'Juego de Geometría', unitCost: 26.83, margin: 30, price: 38.33, stock: 6, minStock: 2 },
                { id: 33, name: 'Folder Carpeta Crema', unitCost: 1.85, margin: 30, price: 2.64, stock: 100, minStock: 25 },
                { id: 34, name: 'Papel Adhesivo', unitCost: 17.00, margin: 30, price: 24.29, stock: 2, minStock: 2 },
                { id: 35, name: 'Bolsa Ch Minecraft', unitCost: 13.00, margin: 30, price: 18.57, stock: 1, minStock: 2 },
                { id: 36, name: 'Bolsa Ch Sonic', unitCost: 13.00, margin: 30, price: 18.57, stock: 1, minStock: 2 },
                { id: 37, name: 'Bolsa Ch Caballero', unitCost: 9.50, margin: 30, price: 13.57, stock: 2, minStock: 2 },
                { id: 38, name: 'Bolsa Ch Dama', unitCost: 9.50, margin: 30, price: 13.57, stock: 2, minStock: 2 },
                { id: 39, name: 'Bolsa Med Flores', unitCost: 11.50, margin: 30, price: 16.43, stock: 2, minStock: 2 },
                { id: 40, name: 'Bolsa Med Caballero', unitCost: 11.50, margin: 30, price: 16.43, stock: 2, minStock: 2 },
                { id: 41, name: 'Bolsa Grande', unitCost: 15.00, margin: 30, price: 21.43, stock: 3, minStock: 2 },
                { id: 42, name: 'Papel Opalina Blanco', unitCost: 0.49, margin: 30, price: 0.70, stock: 100, minStock: 25 },
                { id: 43, name: 'Papel Opalina Marfil', unitCost: 0.55, margin: 30, price: 0.79, stock: 100, minStock: 25 },
                { id: 44, name: 'Hojas de Colores', unitCost: 0.60, margin: 30, price: 0.86, stock: 250, minStock: 62 },
                { id: 45, name: 'Solicitud de Empleo', unitCost: 0.64, margin: 30, price: 0.91, stock: 25, minStock: 6 },
                { id: 46, name: 'Impresión B/N', unitCost: 0, margin: 100, price: 2.00, stock: 999999, minStock: 0 },
                { id: 47, name: 'Impresión Color', unitCost: 0, margin: 100, price: 5.00, stock: 999999, minStock: 0 },
                { id: 48, name: 'Copia B/N', unitCost: 0, margin: 100, price: 1.00, stock: 999999, minStock: 0 },
                { id: 49, name: 'Copia Color', unitCost: 0, margin: 100, price: 3.00, stock: 999999, minStock: 0 },
                { id: 50, name: 'Engargolado', unitCost: 0, margin: 100, price: 15.00, stock: 999999, minStock: 0 }
            ];

            // Cargar datos al iniciar
            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    if (SCRIPT_URL === "PEGAR_AQUI_TU_URL_DE_GOOGLE") {
                        showNotification("Modo Prueba Local (Conecta Sheets para guardar)");
                        setInventory(defaultInventory);
                        setIsLoading(false);
                        return;
                    }
                    const response = await fetch(SCRIPT_URL);
                    const data = await response.json();
                    setInventory(data.inventario || []);
                    setMissingItems(data.missingItems || []);
                } catch (error) {
                    console.error("Error cargando datos:", error);
                    showNotification("Error de conexión");
                }
                setIsLoading(false);
            };

            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(''), 3000);
            };

            // Lógica de Venta
            const addToCart = (product) => {
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    if (existing.quantity >= product.stock) {
                        showNotification('Stock insuficiente'); return;
                    }
                    setCart(cart.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item));
                } else {
                    if (product.stock <= 0) {
                        showNotification('Agotado'); return;
                    }
                    setCart([...cart, { ...product, quantity: 1 }]);
                }
            };

            const checkout = async () => {
                if (cart.length === 0) return;
                
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const nuevaVenta = { id: Date.now(), date: new Date().toLocaleString(), items: cart, total: total };

                // Actualizar interfaz rápido (Optimistic UI)
                const updatedInventory = inventory.map(product => {
                    const cartItem = cart.find(item => item.id === product.id);
                    return cartItem ? { ...product, stock: product.stock - cartItem.quantity } : product;
                });
                setInventory(updatedInventory);
                setCart([]);
                showNotification('Venta procesando...');

                // Enviar a la nube
                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ accion: "venta", venta: nuevaVenta }),
                        headers: { "Content-Type": "text/plain;charset=utf-8" }
                    });
                    showNotification('¡Venta guardada en la nube!');
                } catch (e) {
                    showNotification('Venta hecha, revisa tu conexión a la nube.');
                }
            };

            // Lógica de Faltantes
            const [newMissing, setNewMissing] = useState('');
            const handleAddMissing = async (e) => {
                e.preventDefault();
                if (!newMissing.trim()) return;

                const query = newMissing.trim();
                setNewMissing('');
                showNotification('Registrando faltante...');

                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ accion: "faltante", faltante: { id: Date.now(), name: query } }),
                        headers: { "Content-Type": "text/plain;charset=utf-8" }
                    });
                    showNotification('Faltante anotado');
                    fetchData(); // Recargar datos para ver actualización
                } catch(e) {
                    showNotification('Error al guardar');
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row text-slate-800">
                    {/* Navegación */}
                    <nav className="bg-blue-900 text-white w-full md:w-64 flex-shrink-0 flex flex-col shadow-xl z-10">
                        <div className="p-6 text-2xl font-bold border-b border-blue-800 flex items-center gap-2">
                            <i className="ph ph-package text-3xl"></i> Papelería
                        </div>
                        <div className="flex flex-row md:flex-col p-4 gap-2 overflow-x-auto">
                            <button onClick={() => setActiveTab('pos')} className={`flex items-center gap-3 p-3 rounded-lg transition-colors ${activeTab === 'pos' ? 'bg-blue-800' : 'hover:bg-blue-800/50'}`}>
                                <i className="ph ph-shopping-cart text-xl"></i> Punto de Venta
                            </button>
                            <button onClick={() => setActiveTab('inventory')} className={`flex items-center gap-3 p-3 rounded-lg transition-colors ${activeTab === 'inventory' ? 'bg-blue-800' : 'hover:bg-blue-800/50'}`}>
                                <i className="ph ph-list-magnifying-glass text-xl"></i> Inventario
                            </button>
                            <button onClick={() => setActiveTab('missing')} className={`flex items-center gap-3 p-3 rounded-lg transition-colors ${activeTab === 'missing' ? 'bg-blue-800' : 'hover:bg-blue-800/50'}`}>
                                <i className="ph ph-clipboard-text text-xl"></i> Faltantes
                            </button>
                            <button onClick={fetchData} className="mt-auto flex items-center gap-3 p-3 rounded-lg text-blue-300 hover:text-white hover:bg-blue-800/50 transition-colors">
                                <i className="ph ph-arrows-clockwise text-xl"></i> Sincronizar
                            </button>
                        </div>
                    </nav>

                    {/* Principal */}
                    <main className="flex-1 p-4 md:p-8 h-screen overflow-hidden relative flex flex-col">
                        {notification && (
                            <div className="absolute top-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-2 fade-in z-50">
                                <i className="ph ph-check-circle text-green-400 text-xl"></i> {notification}
                            </div>
                        )}

                        {isLoading ? (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400">
                                <i className="ph ph-spinner-gap animate-spin text-5xl mb-4 text-blue-500"></i>
                                <p>Conectando a la base de datos...</p>
                            </div>
                        ) : (
                            <>
                                {activeTab === 'pos' && <POSView inventory={inventory} cart={cart} addToCart={addToCart} setCart={setCart} checkout={checkout} />}
                                {activeTab === 'inventory' && <InventoryView inventory={inventory} />}
                                {activeTab === 'missing' && <MissingView missingItems={missingItems} newMissing={newMissing} setNewMissing={setNewMissing} handleAddMissing={handleAddMissing} />}
                            </>
                        )}
                    </main>
                </div>
            );
        }

        // --- SUBCOMPONENTES ---

        function POSView({ inventory, cart, addToCart, setCart, checkout }) {
            const [search, setSearch] = useState('');
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const filtered = inventory.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="flex-1 flex flex-col lg:flex-row gap-6 overflow-hidden">
                    {/* Catálogo */}
                    <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col">
                        <div className="relative mb-6">
                            <i className="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl"></i>
                            <input type="text" placeholder="Buscar artículo, copias..." value={search} onChange={e => setSearch(e.target.value)}
                                className="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-lg" />
                        </div>
                        <div className="overflow-y-auto pr-2 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                            {filtered.map(item => (
                                <button key={item.id} onClick={() => addToCart(item)} disabled={item.stock <= 0}
                                    className={`p-4 rounded-xl border text-left transition-all ${item.stock <= 0 ? 'bg-slate-50 opacity-50' : 'bg-white hover:border-blue-400 hover:shadow-md'}`}>
                                    <div className="font-semibold">{item.name}</div>
                                    <div className="text-xs text-slate-500 mt-1">Stock: {item.stock > 900000 ? 'Servicio' : item.stock}</div>
                                    <div className="text-lg font-bold text-blue-600 mt-2">${Number(item.price).toFixed(2)}</div>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Carrito */}
                    <div className="w-full lg:w-96 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col">
                        <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><i className="ph ph-receipt"></i> Venta Actual</h2>
                        <div className="flex-1 overflow-y-auto flex flex-col gap-2">
                            {cart.length === 0 ? <p className="text-center text-slate-400 mt-10">Carrito vacío</p> : 
                                cart.map(item => (
                                    <div key={item.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-lg border border-slate-100">
                                        <div className="flex-1"><div className="font-medium">{item.name}</div><div className="text-sm text-slate-500">{item.quantity}x ${item.price}</div></div>
                                        <div className="font-bold mr-3">${(item.quantity * item.price).toFixed(2)}</div>
                                        <button onClick={() => setCart(cart.filter(i => i.id !== item.id))} className="text-red-400 hover:text-red-600 p-2"><i className="ph ph-trash text-xl"></i></button>
                                    </div>
                                ))
                            }
                        </div>
                        <div className="mt-4 pt-4 border-t">
                            <div className="flex justify-between text-2xl font-bold mb-4"><span>Total:</span><span>${total.toFixed(2)}</span></div>
                            <button onClick={checkout} disabled={cart.length===0} className={`w-full py-4 rounded-xl font-bold text-lg text-white ${cart.length===0 ? 'bg-slate-300' : 'bg-green-500 hover:bg-green-600'}`}>
                                Cobrar
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function InventoryView({ inventory }) {
            return (
                <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col overflow-hidden max-w-6xl mx-auto w-full">
                    <h2 className="text-2xl font-bold mb-6 flex justify-between items-center">
                        <span>Stock Actual en Bodega</span>
                        <span className="text-sm bg-slate-100 text-slate-500 px-3 py-1 rounded-lg">Solo lectura (Edita en Sheets)</span>
                    </h2>
                    <div className="overflow-auto flex-1">
                        <table className="w-full text-left border-collapse text-sm">
                            <thead className="sticky top-0 bg-white shadow-sm text-slate-600 border-b border-slate-200">
                                <tr>
                                    <th className="py-3 px-4">Artículo</th>
                                    <th className="py-3 px-4 text-right">Costo Unit.</th>
                                    <th className="py-3 px-4 text-center">Margen</th>
                                    <th className="py-3 px-4 text-right">Precio Venta</th>
                                    <th className="py-3 px-4 text-right">Existencia</th>
                                    <th className="py-3 px-4 text-center">Mínimo</th>
                                    <th className="py-3 px-4 text-center">Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                {inventory.map(item => {
                                    const isService = item.stock > 900000;
                                    const isLowStock = !isService && item.stock <= (item.minStock || 2);
                                    const isOut = !isService && item.stock === 0;

                                    return (
                                        <tr key={item.id} className="border-b border-slate-100 hover:bg-slate-50">
                                            <td className="py-4 px-4 font-medium text-slate-800">{item.name}</td>
                                            <td className="py-4 px-4 text-right text-slate-500">${Number(item.unitCost || 0).toFixed(2)}</td>
                                            <td className="py-4 px-4 text-center text-slate-500">{item.margin || 30}%</td>
                                            <td className="py-4 px-4 text-right font-bold text-slate-700">${Number(item.price).toFixed(2)}</td>
                                            <td className="py-4 px-4 text-right font-bold text-blue-600">{isService ? '∞' : item.stock}</td>
                                            <td className="py-4 px-4 text-center text-slate-400">{isService ? '-' : (item.minStock || 2)}</td>
                                            <td className="py-4 px-4 text-center">
                                                {isService ? <span className="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs font-bold">SERVICIO</span>
                                                : isOut ? <span className="px-2 py-1 bg-red-100 text-red-700 rounded text-xs font-bold">AGOTADO</span>
                                                : isLowStock ? <span className="px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs font-bold">STOCK BAJO</span>
                                                : <span className="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-bold">OK</span>}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function MissingView({ missingItems, newMissing, setNewMissing, handleAddMissing }) {
            return (
                <div className="flex-1 max-w-2xl mx-auto w-full flex flex-col gap-6">
                    <form onSubmit={handleAddMissing} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 className="text-xl font-bold mb-4">Anotar Faltante</h2>
                        <div className="flex gap-2">
                            <input required type="text" placeholder="Ej. Papel Crepé..." value={newMissing} onChange={e=>setNewMissing(e.target.value)} className="flex-1 p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" />
                            <button type="submit" className="bg-blue-600 text-white px-6 rounded-xl font-bold hover:bg-blue-700">Anotar</button>
                        </div>
                    </form>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border flex-1 overflow-auto">
                        <h2 className="text-xl font-bold mb-4">Lista de Deseos</h2>
                        <div className="flex flex-col gap-2">
                            {missingItems.length === 0 ? <p className="text-slate-400">Sin faltantes.</p> : 
                                [...missingItems].sort((a,b) => b.count - a.count).map(item => (
                                    <div key={item.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border">
                                        <span className="font-medium">{item.name}</span>
                                        <span className="bg-orange-100 text-orange-800 px-3 py-1 rounded-full text-sm font-bold">{item.count} pedidos</span>
                                    </div>
                                ))
                            }
                        </div>
                    </div>
                </div>
            );
        }

        // Renderizado
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
